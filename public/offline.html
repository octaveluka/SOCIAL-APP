<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hors ligne — SocialApp</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding:24px; background:var(--background);">
    <div style="max-width:400px; width:100%; text-align:center;">
        <div style="width:80px; height:80px; background:var(--primary-light); border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 24px;">
            <i class="fa-solid fa-wifi" style="font-size:32px; color:var(--primary);"></i>
        </div>
        <h1 style="font-size:22px; font-weight:800; color:var(--text-primary); margin-bottom:10px;">
            Tu es hors ligne
        </h1>
        <p style="font-size:14px; color:var(--text-secondary); line-height:1.7; margin-bottom:28px;">
            Vérifie ta connexion internet et réessaie. SocialApp a besoin d'une connexion pour fonctionner.
        </p>
        <button onclick="window.location.reload()"
                style="display:inline-flex; align-items:center; gap:8px; padding:12px 28px; background:var(--primary); color:#fff; border:none; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer;">
            <i class="fa-solid fa-rotate-right"></i> Réessayer
        </button>
    </div>
</body>
</html>
